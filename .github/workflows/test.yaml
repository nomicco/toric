name: "test"
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nix
        uses: cachix/install-nix-action@v31
        with:
          install_url: https://releases.nixos.org/nix/nix-2.23.2/install

      - uses: cachix/cachix-action@v16
        with:
          name: holochain-ci

      - name: Geometry crate tests
        run: nix develop --command bash -c "cargo test -p toric-geometry"

      - name: Build zomes and pack happ
        run: nix develop --command bash -c "npm install && npm run build:happ"

      - name: Tryorama integration tests
        # Suites updated for the ledger topology: role "ledger",
        # bilateral (endorsed) transact, succession fields, unsealed
        # credit-limit caps, economic snapshot, closure getter.
        run: nix develop --command bash -c "npm test --workspace tests"